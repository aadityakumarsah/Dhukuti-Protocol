<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 330" font-family="Inter, system-ui, sans-serif">
  <defs>
    <style>
      .bg { fill: #f6f7f2; }
      .panel { fill: #fff; stroke: #d9ddd4; stroke-width: 1; rx: 8; }
      .input { fill: #fbfcf9; stroke: #d9ddd4; stroke-width: 1; rx: 4; }
      .btn-primary { fill: #0f766e; rx: 6; }
      .btn-secondary { fill: #e8ede6; rx: 6; }
      .btn-text { fill: #fff; font-size: 11px; font-weight: 700; text-anchor: middle; }
      .btn-text-dark { fill: #18201c; font-size: 11px; font-weight: 600; text-anchor: middle; }
      .text-title { fill: #18201c; font-size: 14px; font-weight: 700; }
      .text-label { fill: #657067; font-size: 10px; }
      .num { fill: #fff; font-size: 14px; font-weight: 800; }
      .num-bg { fill: #e11d48; }
      .warning { fill: #b91c1c; font-size: 10px; }
    </style>
  </defs>
  <rect class="bg" width="600" height="330" rx="12"/>

  <!-- Contribution Panel -->
  <rect class="panel" x="15" y="15" width="280" height="300"/>
  <text x="35" y="45" class="text-title">Contribution</text>

  <text x="35" y="65" class="text-label">Group address</text>
  <rect class="input" x="35" y="72" width="240" height="36"/>
  <text x="45" y="95" font-size="10" fill="#657067">8DuG9sCNpJcwDWXzNUfXe2SEr3...</text>

  <!-- Join button -->
  <rect class="btn-secondary" x="35" y="120" width="80" height="36"/>
  <text class="btn-text-dark" x="75" y="142">Join</text>

  <!-- Contribute button -->
  <rect class="btn-primary" x="125" y="120" width="120" height="36"/>
  <text class="btn-text" x="185" y="142">💰 Contribute</text>

  <!-- Status message -->
  <text x="35" y="175" font-size="11" fill="#166534" font-weight="600">✓ Contributed: 2xSm39DtHu...</text>

  <text x="35" y="200" class="text-label">What each button does:</text>
  <text x="35" y="218" font-size="10" fill="#657067">• <tspan fill="#18201c" font-weight="600">Join</tspan> — Create your member account and pay security deposit</text>
  <text x="35" y="238" font-size="10" fill="#657067">• <tspan fill="#18201c" font-weight="600">Contribute</tspan> — Send 0.05 SOL to vault for this cycle</text>
  <text x="35" y="258" font-size="10" fill="#b91c1c">⚠ Group must be Active first (404 AlreadyContributed means you already did it!)</text>

  <!-- Voting Panel -->
  <rect class="panel" x="305" y="15" width="280" height="300"/>
  <text x="325" y="45" class="text-title">Janamat Vote</text>

  <text x="325" y="65" class="text-label">Group address</text>
  <rect class="input" x="325" y="72" width="240" height="36"/>
  <text x="335" y="95" font-size="10" fill="#657067">8DuG9sCNpJcwDWXzNUfXe2SEr3...</text>

  <text x="325" y="125" class="text-label">Payout nominee</text>
  <rect class="input" x="325" y="132" width="240" height="36"/>
  <text x="335" y="155" font-size="10" fill="#657067">7pgikeSyocfG74w1f3tMJV8AQ7G56ij5...</text>

  <!-- Vote button -->
  <rect class="btn-primary" x="325" y="180" width="100" height="36"/>
  <text class="btn-text" x="375" y="202">🗳 Vote</text>

  <!-- Status -->
  <text x="325" y="235" font-size="11" fill="#166534" font-weight="600">✓ Voted: 2xSm39DtHu...</text>

  <text x="325" y="260" class="text-label">Tips:</text>
  <text x="325" y="278" font-size="10" fill="#657067">• Both members should vote for the same person</text>
  <text x="325" y="296" font-size="10" fill="#657067">• After voting, creator can click Distribute</text>

  <!-- Annotations -->
  <circle cx="155" cy="120" r="14" class="num-bg"/>
  <text class="num" x="155" y="125" text-anchor="middle">1</text>
  <line x1="169" y1="120" x2="195" y2="100" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="200" y="97" font-size="10" fill="#e11d48" font-weight="600">First Join, then Contribute</text>

  <circle cx="335" cy="132" r="14" class="num-bg"/>
  <text class="num" x="335" y="137" text-anchor="middle">2</text>
  <line x1="349" y1="132" x2="375" y2="110" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="380" y="107" font-size="10" fill="#e11d48" font-weight="600">Paste nominee wallet address</text>

  <circle cx="375" cy="180" r="14" class="num-bg"/>
  <text class="num" x="375" y="185" text-anchor="middle">3</text>
  <line x1="389" y1="180" x2="415" y2="160" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="420" y="157" font-size="10" fill="#e11d48" font-weight="600">Approve in wallet</text>
</svg>