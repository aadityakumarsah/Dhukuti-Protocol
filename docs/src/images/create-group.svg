<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" font-family="Inter, system-ui, sans-serif">
  <defs>
    <style>
      .bg { fill: #f6f7f2; }
      .panel { fill: #fff; stroke: #d9ddd4; stroke-width: 1; rx: 8; }
      .input { fill: #fbfcf9; stroke: #d9ddd4; stroke-width: 1; rx: 4; }
      .btn-primary { fill: #0f766e; rx: 6; }
      .btn-text { fill: #fff; font-size: 11px; font-weight: 700; text-anchor: middle; }
      .text-title { fill: #18201c; font-size: 14px; font-weight: 700; }
      .text-label { fill: #657067; font-size: 10px; }
      .num { fill: #fff; font-size: 14px; font-weight: 800; }
      .num-bg { fill: #e11d48; }
    </style>
  </defs>
  <rect class="bg" width="500" height="420" rx="12"/>
  <rect class="panel" x="15" y="15" width="470" height="390"/>

  <text x="35" y="45" class="text-title">Create Dhukuti Group</text>
  <text x="35" y="62" font-size="10" fill="#657067">Your group PDA: 8DuG9sCNpJcwDWXz...</text>

  <!-- Row 1 -->
  <rect class="input" x="35" y="80" width="200" height="32"/>
  <text x="45" y="100" font-size="10" fill="#657067">0.05</text>
  <text x="240" y="95" class="text-label">Contribution SOL</text>
  <rect class="input" x="260" y="80" width="200" height="32"/>
  <text x="270" y="100" font-size="10" fill="#657067">0.02</text>
  <text x="465" y="95" class="text-label">Security Deposit</text>

  <!-- Row 2 -->
  <rect class="input" x="35" y="130" width="200" height="32"/>
  <text x="45" y="150" font-size="10" fill="#657067">2</text>
  <text x="240" y="145" class="text-label">Members (set to 2 for testing!)</text>
  <rect class="input" x="260" y="130" width="200" height="32"/>
  <text x="270" y="150" font-size="10" fill="#657067">30</text>
  <text x="465" y="145" class="text-label">Cycle Days</text>

  <!-- Row 3 -->
  <rect class="input" x="35" y="180" width="200" height="32"/>
  <text x="45" y="200" font-size="10" fill="#657067">Janamat vote</text>
  <text x="240" y="195" class="text-label">Allocation Method</text>
  <rect class="input" x="260" y="180" width="200" height="32"/>
  <text x="270" y="200" font-size="10" fill="#657067">50</text>
  <text x="465" y="195" class="text-label">Protocol Fee BPS</text>

  <!-- Create button -->
  <rect class="btn-primary" x="35" y="235" width="120" height="38"/>
  <text class="btn-text" x="95" y="259">+ Create Group</text>

  <!-- Status area -->
  <text x="35" y="295" font-size="11" fill="#166534" font-weight="600">✓ Group created successfully!</text>
  <text x="35" y="315" font-size="10" fill="#657067">Group: 8DuG9sCNpJcwDWXzNUfXe2SEr3iiC4Jiduwjh8DiFQAF</text>

  <rect class="btn-secondary" x="35" y="330" width="140" height="30" fill="#e8ede6" rx="6"/>
  <text x="105" y="349" font-size="10" fill="#18201c" font-weight="600" text-anchor="middle">📋 Copy group address</text>

  <rect class="btn-secondary" x="190" y="330" width="140" height="30" fill="#e8ede6" rx="6"/>
  <text x="260" y="349" font-size="10" fill="#18201c" font-weight="600" text-anchor="middle">🔗 View transaction</text>

  <!-- Annotations -->
  <circle cx="35" cy="80" r="12" class="num-bg"/>
  <text class="num" x="35" y="85" text-anchor="middle">1</text>
  <line x1="47" y1="80" x2="70" y2="65" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="75" y="62" font-size="10" fill="#e11d48" font-weight="600">Set contribution amount (0.05 SOL)</text>

  <circle cx="260" cy="130" r="12" class="num-bg"/>
  <text class="num" x="260" y="135" text-anchor="middle">2</text>
  <line x1="272" y1="130" x2="295" y2="115" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="300" y="112" font-size="10" fill="#e11d48" font-weight="600">Set Members = 2 for testing!</text>

  <circle cx="35" cy="235" r="12" class="num-bg"/>
  <text class="num" x="35" y="240" text-anchor="middle">3</text>
  <line x1="47" y1="235" x2="18" y2="260" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="-18" y="278" font-size="10" fill="#e11d48" font-weight="600">Click Create &amp; approve in wallet</text>

  <circle cx="35" cy="295" r="12" class="num-bg"/>
  <text class="num" x="35" y="300" text-anchor="middle">4</text>
  <line x1="47" y1="295" x2="20" y2="320" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="-18" y="338" font-size="10" fill="#e11d48" font-weight="600">Copy group address &amp; share</text>
</svg>