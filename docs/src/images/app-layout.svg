<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e11d48"/>
    </marker>
    <style>
      .bg { fill: #f6f7f2; }
      .panel { fill: #fff; stroke: #d9ddd4; stroke-width: 1; rx: 8; }
      .header { fill: #fff; stroke: #d9ddd4; stroke-width: 1; }
      .text-title { fill: #18201c; font-size: 13px; font-weight: 700; }
      .text-label { fill: #657067; font-size: 10px; }
      .text-val { fill: #18201c; font-size: 11px; font-weight: 600; }
      .btn-primary { fill: #0f766e; rx: 6; }
      .btn-secondary { fill: #e8ede6; rx: 6; }
      .btn-text { fill: #fff; font-size: 10px; font-weight: 600; text-anchor: middle; }
      .btn-text-dark { fill: #18201c; font-size: 10px; font-weight: 600; text-anchor: middle; }
      .num { fill: #e11d48; font-size: 14px; font-weight: 800; }
      .callout { fill: #e11d48; font-size: 11px; font-weight: 600; }
      .divider { stroke: #d9ddd4; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="700" rx="12"/>

  <!-- Top Bar -->
  <rect class="header" x="0" y="0" width="900" height="56"/>
  <text x="20" y="25" font-size="9" fill="#0f766e" font-weight="700">SOLANA ROSCA PROTOCOL</text>
  <text x="20" y="44" font-size="16" fill="#18201c" font-weight="800">Dhukuti Protocol</text>

  <!-- Wallet area top right -->
  <rect class="btn-secondary" x="680" y="14" width="70" height="28"/>
  <text class="btn-text-dark" x="715" y="33">Docs</text>
  <rect class="btn-secondary" x="756" y="14" width="60" height="28"/>
  <text class="btn-text-dark" x="786" y="33">My group</text>
  <rect class="btn-secondary" x="822" y="14" width="60" height="28"/>
  <text class="btn-text-dark" x="852" y="33">Devnet</text>

  <!-- Hero section -->
  <text x="25" y="90" font-size="32" fill="#18201c" font-weight="800">Trustless rotating savings for community finance.</text>
  <text x="25" y="115" font-size="14" fill="#657067">Create a savings circle, escrow contributions in a PDA vault...</text>

  <!-- Metrics Grid -->
  <rect class="panel" x="25" y="130" width="130" height="90"/>
  <text x="40" y="155" font-size="11" fill="#18201c" font-weight="700">PDA escrow</text>
  <text x="40" y="172" font-size="10" fill="#657067">No organizer custody</text>

  <rect class="panel" x="165" y="130" width="130" height="90"/>
  <text x="180" y="155" font-size="11" fill="#18201c" font-weight="700">Janamat voting</text>
  <text x="180" y="172" font-size="10" fill="#657067">On-chain allocation</text>

  <rect class="panel" x="305" y="130" width="130" height="90"/>
  <text x="320" y="155" font-size="11" fill="#18201c" font-weight="700">Deposit staking</text>
  <text x="320" y="172" font-size="10" fill="#657067">Slash defaults</text>

  <rect class="panel" x="445" y="130" width="130" height="90"/>
  <text x="460" y="155" font-size="11" fill="#18201c" font-weight="700">Reputation</text>
  <text x="460" y="172" font-size="10" fill="#657067">Credit history</text>

  <!-- Callout 1: Top right header -->
  <circle cx="830" cy="6" r="14" fill="#e11d48"/>
  <text class="num" x="830" y="11" text-anchor="middle" fill="#fff">1</text>
  <line x1="830" y1="20" x2="830" y2="48" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="840" y="44" class="callout" fill="#e11d48">Connect wallet, see network</text>

  <!-- Callout 2: Hero -->
  <circle cx="25" cy="72" r="14" fill="#e11d48"/>
  <text class="num" x="25" y="77" text-anchor="middle" fill="#fff">2</text>
  <line x1="39" y1="72" x2="70" y2="72" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="74" y="76" class="callout" fill="#e11d48">App description &amp; highlights</text>

  <!-- Workspace section -->
  <text x="25" y="250" font-size="13" fill="#18201c" font-weight="700">Workspace (panels below)</text>
  <line class="divider" x1="25" y1="258" x2="875" y2="258"/>

  <!-- Group Selector (full width) -->
  <rect class="panel" x="25" y="270" width="850" height="54"/>
  <text x="40" y="290" class="text-title">Group Selector &amp; Quick Switcher</text>
  <rect x="40" y="300" width="200" height="16" rx="4" fill="#f0fdf4" stroke="#b9f6ca" stroke-width="1"/>
  <circle cx="50" cy="308" r="4" fill="#166534"/>
  <text x="60" y="312" font-size="9" fill="#166534" font-weight="600">Active · 8DuG9sCN...DiFQAF</text>

  <!-- Panel layout -->
  <rect class="panel" x="25" y="334" width="420" height="180"/>
  <text x="40" y="354" class="text-title">Create Dhukuti Group</text>
  <text x="40" y="370" font-size="9" fill="#657067">Your group PDA: 8DuG9sCNp...</text>
  <rect x="40" y="380" width="185" height="28" rx="4" fill="#fbfcf9" stroke="#d9ddd4"/>
  <text x="50" y="398" font-size="9" fill="#657067">Contribution SOL</text>
  <rect x="235" y="380" width="185" height="28" rx="4" fill="#fbfcf9" stroke="#d9ddd4"/>
  <text x="245" y="398" font-size="9" fill="#657067">Security Deposit</text>
  <rect x="40" y="416" width="185" height="28" rx="4" fill="#fbfcf9" stroke="#d9ddd4"/>
  <rect x="235" y="416" width="185" height="28" rx="4" fill="#fbfcf9" stroke="#d9ddd4"/>
  <rect class="btn-primary" x="40" y="460" width="100" height="32"/>
  <text class="btn-text" x="90" y="480">+ Create</text>

  <rect class="panel" x="455" y="334" width="420" height="180"/>
  <text x="470" y="354" class="text-title">Group Dashboard</text>
  <text x="470" y="370" class="text-label">Status</text>
  <rect x="520" y="360" width="65" height="18" rx="999" fill="#dcfce7"/>
  <text x="552" y="373" font-size="10" fill="#166534" font-weight="600" text-anchor="middle">Forming</text>
  <text x="470" y="390" class="text-label">Members</text>
  <text x="530" y="390" class="text-val">0 / 2</text>
  <text x="470" y="410" class="text-label">Contribution</text>
  <text x="550" y="410" class="text-val">0.050 SOL</text>
  <text x="470" y="430" class="text-label">Pool (full)</text>
  <text x="535" y="430" class="text-val">0.100 SOL</text>

  <rect class="panel" x="25" y="524" width="280" height="80"/>
  <text x="40" y="544" class="text-title">Contribution</text>
  <rect x="40" y="555" width="160" height="22" rx="4" fill="#fbfcf9" stroke="#d9ddd4"/>
  <text x="50" y="569" font-size="9" fill="#657067">Group address...</text>
  <rect class="btn-secondary" x="210" y="553" width="65" height="24"/>
  <text class="btn-text-dark" x="242" y="569">Join</text>
  <rect class="btn-primary" x="40" y="584" width="100" height="24"/>
  <text class="btn-text" x="90" y="600">Contribute</text>

  <rect class="panel" x="315" y="524" width="280" height="80"/>
  <text x="330" y="544" class="text-title">Janamat Vote</text>
  <rect x="330" y="555" width="160" height="22" rx="4" fill="#fbfcf9" stroke="#d9ddd4"/>
  <rect class="btn-primary" x="330" y="582" width="80" height="22"/>
  <text class="btn-text" x="370" y="597">Vote</text>

  <rect class="panel" x="605" y="524" width="270" height="80"/>
  <text x="620" y="544" class="text-title">Reputation</text>
  <text x="620" y="562" class="text-label">Score: Pending</text>
  <rect class="btn-primary" x="620" y="575" width="80" height="22"/>
  <text class="btn-text" x="660" y="590">Claim</text>

  <!-- Callout 3: Workspace panels -->
  <circle cx="12" cy="270" r="14" fill="#e11d48"/>
  <text class="num" x="12" y="275" text-anchor="middle" fill="#fff">3</text>
  <line x1="26" y1="270" x2="50" y2="270" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="54" y="274" class="callout" fill="#e11d48">Main workspace: all panels here</text>

  <!-- Callout 4: Create Group -->
  <circle cx="12" cy="334" r="14" fill="#e11d48"/>
  <text class="num" x="12" y="339" text-anchor="middle" fill="#fff">4</text>
  <line x1="26" y1="334" x2="50" y2="334" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="54" y="338" class="callout" fill="#e11d48">Fill form &amp; create</text>

  <!-- Callout 5: Dashboard -->
  <circle cx="442" cy="334" r="14" fill="#e11d48"/>
  <text class="num" x="442" y="339" text-anchor="middle" fill="#fff">5</text>
  <line x1="456" y1="334" x2="480" y2="334" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="484" y="338" class="callout" fill="#e11d48">Group status &amp; action buttons</text>

  <!-- Callout 6: Action panels -->
  <circle cx="12" cy="524" r="14" fill="#e11d48"/>
  <text class="num" x="12" y="529" text-anchor="middle" fill="#fff">6</text>
  <line x1="26" y1="524" x2="50" y2="524" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="54" y="528" class="callout" fill="#e11d48">Join, Contribute, Vote, Claim</text>
</svg>