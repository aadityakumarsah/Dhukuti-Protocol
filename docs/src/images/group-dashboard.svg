<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <style>
      .bg { fill: #f6f7f2; }
      .panel { fill: #fff; stroke: #d9ddd4; stroke-width: 1; rx: 8; }
      .data-row { stroke: #d9ddd4; stroke-width: 1; }
      .btn-primary { fill: #0f766e; rx: 6; }
      .btn-secondary { fill: #e8ede6; rx: 6; }
      .btn-text { fill: #fff; font-size: 10px; font-weight: 700; text-anchor: middle; }
      .btn-text-dark { fill: #18201c; font-size: 10px; font-weight: 600; text-anchor: middle; }
      .text-title { fill: #18201c; font-size: 14px; font-weight: 700; }
      .text-label { fill: #657067; font-size: 10px; }
      .text-val { fill: #18201c; font-size: 11px; font-weight: 600; }
      .num { fill: #fff; font-size: 13px; font-weight: 800; }
      .num-bg { fill: #e11d48; }
      .pill { fill: #dcfce7; rx: 999; }
      .pill-text { fill: #166534; font-size: 10px; font-weight: 600; text-anchor: middle; }
    </style>
  </defs>
  <rect class="bg" width="600" height="520" rx="12"/>
  <rect class="panel" x="15" y="15" width="570" height="490"/>

  <text x="35" y="45" class="text-title">Group Dashboard</text>

  <!-- Data list -->
  <g transform="translate(35, 60)">
    <line class="data-row" x1="0" y1="30" x2="530" y2="30"/>
    <text x="0" y="20" class="text-label">Status</text>
    <rect class="pill" x="190" y="8" width="65" height="22"/>
    <text class="pill-text" x="222" y="23">Active</text>

    <line class="data-row" x1="0" y1="52" x2="530" y2="52"/>
    <text x="0" y="44" class="text-label">Cycle</text>
    <text x="190" y="44" class="text-val">1 / 2</text>

    <line class="data-row" x1="0" y1="74" x2="530" y2="74"/>
    <text x="0" y="66" class="text-label">Members</text>
    <text x="190" y="66" class="text-val">2 / 2</text>

    <line class="data-row" x1="0" y1="96" x2="530" y2="96"/>
    <text x="0" y="88" class="text-label">Contribution</text>
    <text x="190" y="88" class="text-val">0.050 SOL</text>

    <line class="data-row" x1="0" y1="118" x2="530" y2="118"/>
    <text x="0" y="110" class="text-label">Pool this cycle</text>
    <text x="190" y="110" class="text-val">0.100 SOL</text>

    <line class="data-row" x1="0" y1="140" x2="530" y2="140"/>
    <text x="0" y="132" class="text-label">Allocation</text>
    <text x="190" y="132" class="text-val">Janamat vote</text>

    <line class="data-row" x1="0" y1="162" x2="530" y2="162"/>
    <text x="0" y="154" class="text-label">Group address</text>
    <text x="190" y="154" font-size="10" fill="#18201c" font-weight="600">8DuG9sCN...DiFQAF</text>
  </g>

  <!-- Button row -->
  <g transform="translate(35, 235)">
    <rect class="btn-secondary" x="0" y="0" width="100" height="32"/>
    <text class="btn-text-dark" x="50" y="20">📋 Copy</text>
    <rect class="btn-secondary" x="110" y="0" width="90" height="32"/>
    <text class="btn-text-dark" x="155" y="20">🔗 Explorer</text>
    <rect class="btn-secondary" x="210" y="0" width="80" height="32"/>
    <text class="btn-text-dark" x="250" y="20">🔄 Refresh</text>
    <!-- Activate button highlighted -->
    <rect class="btn-primary" x="300" y="0" width="100" height="32"/>
    <text class="btn-text" x="350" y="20">▶ Activate</text>
    <rect class="btn-secondary" x="410" y="0" width="100" height="32" fill="#d1d5db"/>
    <text class="btn-text-dark" x="460" y="20">Distribute</text>
  </g>

  <!-- Members List -->
  <g transform="translate(35, 290)">
    <line class="data-row" x1="0" y1="0" x2="530" y2="0"/>
    <text x="0" y="18" class="text-title" font-size="12">Members List (2 / 2 joined)</text>
    <line class="data-row" x1="0" y1="32" x2="530" y2="32"/>

    <!-- Table header -->
    <text x="0" y="50" font-size="9" fill="#657067" font-weight="600">WALLET</text>
    <text x="150" y="50" font-size="9" fill="#657067" font-weight="600">CONTRIBUTED</text>
    <text x="260" y="50" font-size="9" fill="#657067" font-weight="600">PAID OUT?</text>
    <text x="370" y="50" font-size="9" fill="#657067" font-weight="600">REPUTATION</text>

    <line class="data-row" x1="0" y1="58" x2="530" y2="58"/>

    <!-- Member 1: Creator -->
    <circle cx="6" cy="80" r="3" fill="#166534"/>
    <text x="15" y="84" font-size="11" fill="#18201c" font-weight="600">7pgike...otSp</text>
    <text x="150" y="84" font-size="11" fill="#657067">1 cycle</text>
    <text x="260" y="84" font-size="11" fill="#657067">No</text>
    <text x="375" y="84" font-size="11" fill="#18201c" font-weight="600">0</text>

    <line class="data-row" x1="0" y1="98" x2="530" y2="98"/>

    <!-- Member 2 -->
    <circle cx="6" cy="120" r="3" fill="#166534"/>
    <text x="15" y="124" font-size="11" fill="#18201c" font-weight="600">DX3MAD...3btF</text>
    <text x="150" y="124" font-size="11" fill="#657067">1 cycle</text>
    <text x="260" y="124" font-size="11" fill="#657067">No</text>
    <text x="375" y="124" font-size="11" fill="#18201c" font-weight="600">0</text>
  </g>

  <!-- Annotations -->
  <circle cx="225" cy="235" r="13" class="num-bg"/>
  <text class="num" x="225" y="240" text-anchor="middle">1</text>
  <line x1="238" y1="235" x2="265" y2="215" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="270" y="212" font-size="10" fill="#e11d48" font-weight="600">Status: Active or Forming</text>

  <circle cx="330" cy="234" r="13" class="num-bg"/>
  <text class="num" x="330" y="239" text-anchor="middle">2</text>
  <line x1="343" y1="234" x2="370" y2="215" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="375" y="212" font-size="10" fill="#e11d48" font-weight="600">Activate button (creator only)</text>

  <circle cx="35" cy="348" r="13" class="num-bg"/>
  <text class="num" x="35" y="353" text-anchor="middle">3</text>
  <line x1="48" y1="348" x2="80" y2="338" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="85" y="335" font-size="10" fill="#e11d48" font-weight="600">Members list: check who joined</text>

  <circle cx="375" cy="78" r="13" class="num-bg"/>
  <text class="num" x="375" y="83" text-anchor="middle">4</text>
  <line x1="388" y1="78" x2="420" y2="68" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="425" y="65" font-size="10" fill="#e11d48" font-weight="600">Check vault balance on Solscan</text>
</svg>